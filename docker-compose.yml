services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: trust
      POSTGRES_PASSWORD: trust
      POSTGRES_DB: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trust -d trust"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://trust:trust@postgres:5432/trust
      REDIS_URL: redis://redis:6379/0
      # Dev-only API key. Override before any non-local use.
      API_KEYS: ${API_KEYS:-dev-key}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    # Apply migrations, then serve.
    command: >-
      sh -c "alembic upgrade head &&
             uvicorn trust_api.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:

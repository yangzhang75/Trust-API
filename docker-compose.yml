services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: trust
      POSTGRES_PASSWORD: trust
      POSTGRES_DB: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trust -d trust"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot migration runner. api/worker/dashboard all wait for this to
  # complete, so migrations run exactly once — previously api and worker both
  # ran `alembic upgrade head` on startup and raced to create alembic_version.
  migrate:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://trust:trust@postgres:5432/trust
    command: alembic upgrade head

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg://trust:trust@postgres:5432/trust
      REDIS_URL: redis://redis:6379/0
      # Dev-only API key. Override before any non-local use.
      API_KEYS: ${API_KEYS:-dev-key}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Web3 data provider key (Etherscan V2). Blank = ingestion disabled.
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY:-}
    ports:
      - "8000:8000"
    command: uvicorn trust_api.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg://trust:trust@postgres:5432/trust
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY:-}
      WORKER_INTERVAL_SECONDS: ${WORKER_INTERVAL_SECONDS:-3600}
    command: python -m trust_api.worker

  # Internal monitoring dashboard (Week 8). Separate Streamlit process reading
  # the same Postgres + Redis; not coupled to the FastAPI app. Access requires
  # a dashboard admin key or a valid API key (see docs/dashboard.md).
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg://trust:trust@postgres:5432/trust
      REDIS_URL: redis://redis:6379/0
      API_KEYS: ${API_KEYS:-dev-key}
      DASHBOARD_API_KEYS: ${DASHBOARD_API_KEYS:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8501:8501"
    command: >-
      streamlit run dashboard/streamlit_app.py
      --server.port=8501 --server.address=0.0.0.0

volumes:
  pgdata:

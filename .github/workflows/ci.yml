name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Test/CI configuration — never use these values outside CI.
      API_KEYS: "test-key"
      REDIS_URL: "redis://localhost:6379/0"
      DATABASE_URL: "postgresql+psycopg://trust:trust@localhost:5432/trust"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src tests

      - name: Black check
        run: black --check src tests

      - name: Pytest with coverage
        run: pytest --cov=trust_api --cov-report=term-missing --cov-fail-under=80
